name: PodLink
options:
  bundleIdPrefix: com.podlink
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: PodLink/Info.plist
    DEVELOPMENT_TEAM: ""

targets:
  PodLink:
    type: application
    platform: iOS
    sources:
      - path: PodLink
        excludes:
          - Resources/DefaultPodcasts.json
          - Resources/MediaPatterns.json
    resources:
      - path: PodLink/Resources/DefaultPodcasts.json
      - path: PodLink/Resources/MediaPatterns.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.podlink.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: PodLink/Info.plist
    info:
      path: PodLink/Info.plist
    entitlements:
      path: PodLink/PodLink.entitlements

schemes:
  PodLink:
    build:
      targets:
        PodLink: all
    run:
      config: Debug
